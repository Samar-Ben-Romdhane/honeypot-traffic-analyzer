name: Deploy Honeypot Traffic Analyzer to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure Container Registry Login
        run: |
          az acr login --name ${{ secrets.AZURE_REGISTRY_NAME }}

      - name: Build and Push Docker Image to ACR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/honeypot-analyzer:${{ github.sha }}
            ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/honeypot-analyzer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          images: '${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/honeypot-analyzer:latest'
